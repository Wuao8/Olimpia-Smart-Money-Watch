<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Olimpia Smart Money Watch</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <h1>OLIMPIA</h1>
    <p class="subtitle">Smart Money Intelligence Engine</p>
</header>

<section class="stats">

    <div class="card">
        <h3>Top Signal</h3>
        <div id="topSignal">--</div>
    </div>

    <div class="card">
        <h3>Top Score</h3>
        <div id="topScore">--</div>
    </div>

    <div class="card">
        <h3>Crypto Signals</h3>
        <div id="cryptoCount">--</div>
    </div>

</section>

<section class="table-section">

<table>
    <thead>
        <tr>
            <th>Market</th>
            <th>Asset</th>
            <th>Action</th>
            <th>Size</th>
            <th>Who</th>
            <th>Source</th>
            <th>Score</th>
        </tr>
    </thead>

    <tbody id="tableBody"></tbody>
</table>

</section>

<script src="script.js"></script>

</body>
</html>
